name: Generate Animated Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 📊 Animated GitHub Stats Card
      - name: Generate GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: yashvendranirwan-alt
          template: classic
          base: header, activity, community, repositories
          filename: dist/metrics.svg

          # 🎵 Animate everything
          config_animations: yes

          # 🏆 Achievements badge
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 6

          # 📅 Contribution calendar (animated)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🌟 Most used languages
          plugin_languages: yes
          plugin_languages_animated: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage

          # 🎯 Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes
          plugin_habits_charts_type: chartist

          # ✨ Stars given
          plugin_stars: yes
          plugin_stars_limit: 4

      # 🚀 Deploy to output branch
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
